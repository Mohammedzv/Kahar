<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام كاشير الهواتف - Elalmy POS</title>
    <script src="https://unpkg.com/html5-qrcode"></script> <!-- مكتبة ماسح الباركود -->
    <style>
        /* إضافة ستايلات خاصة بالتنبيهات */
        .low-stock-alert { background: #ff3d71; color: white; padding: 10px; display: none; }
    </style>
</head>
<body>

<div id="lowStockBanner" class="low-stock-alert">⚠️ تنبيه: بعض قطع الغيار أو الهواتف على وشك النفاد!</div>

<!-- واجهة ماسح الباركود -->
<div id="reader" style="width: 300px;"></div>

<!-- حقول بيانات العميل -->
<input type="text" id="customerName" placeholder="اسم العميل">
<input type="text" id="shopName" value="محل موبايلات Elalmy" placeholder="اسم المحل">

<script>
// 1. نظام ماسح الباركود
function startScanner() {
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" }, 
      { fps: 10, qrbox: 250 },
      (decodedText) => {
        document.getElementById('productIdInput').value = decodedText;
        // هنا يتم استدعاء دالة إضافة المنتج للسلة تلقائياً
        html5QrCode.stop();
      }
    ).catch(err => console.log(err));
}

// 2. نظام تنبيه المخزن
function checkLowStock() {
  const low = products.filter(p => p.stock <= 5 && p.stock > 0);
  const banner = document.getElementById('lowStockBanner');
  if (low.length > 0) {
    banner.style.display = 'block';
    banner.textContent = `⚠️ تنبيه: ${low.map(p=>p.name).join(' | ')} على وشك النفاد!`;
  }
}

// 3. طباعة الفاتورة ببيانات المحل والعميل
function printReceipt(items, total) {
    let shop = document.getElementById('shopName').value;
    let customer = document.getElementById('customerName').value;
    let receiptWindow = window.open('', '_blank');
    receiptWindow.document.write(`
        <div style="text-align:center;">
            <h1>${shop}</h1>
            <p>العميل: ${customer}</p>
            <hr>
            <p>الإجمالي: ${total} جنيه</p>
        </div>
    `);
    receiptWindow.print();
}

// 4. سجل المشتريات
function logPurchase(productName, qty) {
    let history = JSON.parse(localStorage.getItem('purchase_history') || '[]');
    history.push({ item: productName, count: qty, date: new Date().toLocaleString('ar-EG') });
    localStorage.setItem('purchase_history', JSON.stringify(history));
}

// تشغيل النظام عند التحميل
window.onload = () => {
    checkLowStock();
    startScanner();
};
</script>
</body>
</html>
