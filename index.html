<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام Elalmy POS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f8ff; padding: 20px; margin: 0; }
        .page { display: none; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .active { display: block; }
        .btn { background: #87ceeb; color: white; border: none; padding: 15px; width: 100%; margin: 10px 0; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        h2 { color: #4682b4; text-align: center; }
    </style>
</head>
<body>

<!-- الرئيسية -->
<div id="home" class="page active">
    <h2>📱 لوحة التحكم الرئيسية</h2>
    <button class="btn" onclick="showPage('addProd')">➕ إضافة منتجات</button>
    <button class="btn" onclick="showPage('sales')">💰 إدارة الحسابات</button>
    <input type="text" id="barcodeInput" placeholder="ضع الماسح هنا وامسح الكود..." autofocus>
</div>

<!-- صفحة إضافة المنتجات -->
<div id="addProd" class="page">
    <h2>➕ إضافة منتج جديد</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <button class="btn" onclick="saveProduct()">حفظ المنتج</button>
    <button class="btn" style="background:#ccc" onclick="showPage('home')">رجوع</button>
</div>

<!-- صفحة الحسابات -->
<div id="sales" class="page">
    <h2>💰 سجل المبيعات</h2>
    <div id="salesLog"></div>
    <button class="btn" style="background:#ccc" onclick="showPage('home')">رجوع</button>
</div>

<script>
    // التنقل بين الصفحات
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'home') document.getElementById('barcodeInput').focus();
    }

    // دعم الماسح الخارجي
    document.getElementById('barcodeInput').addEventListener('input', (e) => {
        let code = e.target.value;
        if(code.length > 5) {
            let log = JSON.parse(localStorage.getItem('sales') || '[]');
            log.push({code: code, date: new Date().toLocaleString()});
            localStorage.setItem('sales', JSON.stringify(log));
            alert("تم تسجيل عملية بيع: " + code);
            e.target.value = "";
            renderSales();
        }
    });

    // حفظ المنتج
    function saveProduct() {
        let p = { name: document.getElementById('pName').value, price: document.getElementById('pPrice').value };
        let list = JSON.parse(localStorage.getItem('products') || '[]');
        list.push(p);
        localStorage.setItem('products', JSON.stringify(list));
        alert("تم الحفظ!");
        showPage('home');
    }

    // عرض سجل المبيعات
    function renderSales() {
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        document.getElementById('salesLog').innerHTML = log.map(s => `<p>${s.code} - ${s.date}</p>`).join('');
    }
    
    window.onload = renderSales;
</script>
</body>
</html>
