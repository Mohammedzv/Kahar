<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام كاشير SkyPOS المتكامل</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #87ceeb; --accent: #4682b4; --bg: #f0f8ff; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ إدارة المخزن</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="number" id="pStock" placeholder="الكمية">
    <button onclick="addProduct()">حفظ المنتج</button>
</div>

<div class="card">
    <h2>📱 الكاشير</h2>
    <div id="reader" style="width: 100%; height: 200px; border: 2px solid var(--primary);"></div>
    <input type="text" id="custName" placeholder="اسم العميل">
    <button onclick="sellProduct()" style="background: var(--accent);">إتمام البيع وطباعة الفاتورة</button>
</div>

<div class="card">
    <h2>📋 المخزون الحالي</h2>
    <table id="stockTable">
        <tr><th>المنتج</th><th>السعر</th><th>الكمية</th></tr>
    </table>
</div>

<script>
    // حفظ منتج
    function addProduct() {
        let list = JSON.parse(localStorage.getItem('pos_products') || '[]');
        list.push({name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, stock: parseInt(document.getElementById('pStock').value)});
        localStorage.setItem('pos_products', JSON.stringify(list));
        location.reload();
    }

    // عرض المخزون
    function renderStock() {
        let list = JSON.parse(localStorage.getItem('pos_products') || '[]');
        let table = document.getElementById('stockTable');
        list.forEach(p => {
            table.innerHTML += `<tr><td>${p.name}</td><td>${p.price}</td><td>${p.stock}</td></tr>`;
            if(p.stock <= 5) alert("تنبيه: " + p.name + " قارب على النفاد!");
        });
    }

    // عملية بيع
    function sellProduct() {
        let name = document.getElementById('pName').value; // للتبسيط
        let list = JSON.parse(localStorage.getItem('pos_products') || '[]');
        let p = list.find(x => x.name == name);
        if(p && p.stock > 0) {
            p.stock--;
            localStorage.setItem('pos_products', JSON.stringify(list));
            alert("تم البيع للعميل: " + document.getElementById('custName').value);
            window.print();
        }
    }

    // تشغيل الماسح
    new Html5Qrcode("reader").start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (t) => { document.getElementById('pName').value = t; });
    
    window.onload = renderStock;
</script>
</body>
</html>
