<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الكاشير - Top STORE </title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 15px; }
        .page { display: none; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .active { display: block; }
        .btn { background: #3498db; color: white; border: none; padding: 12px; width: 100%; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .alert-btn { background: #e74c3c; }
    </style>
</head>
<body>

<!-- الرئيسية -->
<div id="home" class="page active">
    <h2>📱 كاشير TOP STORE</h2>
    <input type="text" id="manualName" placeholder="اسم المنتج">
    <input type="number" id="manualPrice" placeholder="السعر">
    <button class="btn" style="background:#27ae60" onclick="manualSale()">إتمام البيع وطباعة الفاتورة</button>
    
    <input type="text" id="barcode" placeholder="الماسح الخارجي هنا..." autofocus onchange="processBarcode(this.value)">
    
    <button class="btn" onclick="showPage('addProd')">➕ إضافة منتجات للمخزن</button>
    <button class="btn" onclick="showPage('sales')">💰 إدارة الحسابات</button>
    <button class="btn alert-btn" onclick="resetDay()">🔄 تجديد اليوم (مسح سجلات)</button>
</div>

<!-- صفحات الإضافة والحسابات -->
<div id="addProd" class="page">
    <h2>➕ إضافة للمخزن</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <button class="btn" onclick="alert('تم الحفظ في المخزن!')">حفظ</button>
    <button class="btn" style="background:#7f8c8d" onclick="showPage('home')">رجوع</button>
</div>

<div id="sales" class="page">
    <h2>💰 سجل المبيعات</h2>
    <div id="salesLog"></div>
    <button class="btn" style="background:#7f8c8d" onclick="showPage('home')">رجوع</button>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'home') document.getElementById('barcode').focus();
    }

    function printReceipt(name, price) {
        let win = window.open('', '_blank', 'width=400,height=500');
        win.document.write(`
            <div style="text-align:center; direction:rtl; font-family:sans-serif;">
                <h1>TOP STORE</h1>
                <p>المنتج: ${name}</p>
                <p>السعر: ${price} ج.م</p>
                <hr><p>لتحويل الكاش 01033160942</p>
               <p> شكراً لتعاملكم معنا</p>
            </div>
        `);
        win.print();
    }

    function manualSale() {
        let name = document.getElementById('manualName').value;
        let price = document.getElementById('manualPrice').value;
        if(!name) return alert("اكتب اسم المنتج!");
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        log.push({name, price, date: new Date().toLocaleTimeString()});
        localStorage.setItem('sales', JSON.stringify(log));
        printReceipt(name, price);
        renderSales();
    }

    function resetDay() {
        if(confirm("هل أنت متأكد من مسح سجلات اليوم؟")) {
            localStorage.removeItem('sales');
            renderSales();
            alert("تم تجديد اليوم بنجاح!");
        }
    }

    function renderSales() {
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        document.getElementById('salesLog').innerHTML = log.map(s => `<p>${s.name} - ${s.price} ج.م</p>`).join('');
    }

    window.onload = renderSales;
</script>
</body>
</html>
