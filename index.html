<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشير TOP STORE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 15px; }
        .page { display: none; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .active { display: block; }
        .btn { background: #3498db; color: white; border: none; padding: 10px; width: 100%; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 5px; }
        .log-item { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<!-- الرئيسية -->
<div id="home" class="page active">
    <h2>📱 كاشير TOP STORE</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <button class="btn" style="background:#f39c12" onclick="addToCart()">➕ إضافة للسلة</button>
    
    <div id="cart" style="margin: 15px 0; border: 2px dashed #3498db; padding: 10px;">
        <h3>🛒 السلة الحالية:</h3>
        <div id="cartItems"></div>
        <button class="btn" style="background:#27ae60" onclick="checkout()">✅ إتمام البيع وطباعة الفاتورة</button>
    </div>

    <button class="btn" onclick="showPage('sales')">💰 إدارة الحسابات</button>
    <button class="btn" style="background:#e74c3c" onclick="resetDay()">🔄 تجديد اليوم</button>
</div>

<!-- الحسابات -->
<div id="sales" class="page">
    <h2>💰 سجل المبيعات</h2>
    <div id="salesLog"></div>
    <button class="btn" style="background:#7f8c8d" onclick="showPage('home')">رجوع</button>
</div>

<script>
    let cart = [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(pageId === 'sales') renderSales();
    }

    function addToCart() {
        let name = document.getElementById('pName').value;
        let price = parseFloat(document.getElementById('pPrice').value);
        if(!name || !price) return alert("اكتب البيانات!");
        cart.push({name, price});
        renderCart();
        document.getElementById('pName').value = "";
        document.getElementById('pPrice').value = "";
    }

    function renderCart() {
        document.getElementById('cartItems').innerHTML = cart.map((item) => 
            `<div class="cart-item">${item.name} - ${item.price} ج.م</div>`).join('');
    }

    function checkout() {
        if(cart.length === 0) return alert("السلة فارغة!");
        let total = cart.reduce((sum, item) => sum + item.price, 0);
        let saleEntry = {cart: [...cart], total, date: new Date().toLocaleTimeString()};
        
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        log.push(saleEntry);
        localStorage.setItem('sales', JSON.stringify(log));
        
        printReceipt(saleEntry);
        cart = [];
        renderCart();
    }

    function printReceipt(entry) {
        let win = window.open('', '_blank', 'width=400,height=500');
        win.document.write(`<div style="direction:rtl; text-align:center; font-family:sans-serif;">
            <h1>TOP STORE</h1>
            ${entry.cart.map(i => `<p>${i.name}: ${i.price} ج.م</p>`).join('')}
            <hr><h3>الإجمالي: ${entry.total} ج.م</h3>
            <p></p><p>لتحويل فودافون كاش ع رقم 01033160942 عنوان المحل قبضايا-بجوار كافيه الهضبه</p>
        </div>`);
        win.print();
    }

    function renderSales() {
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        let totalDay = log.reduce((sum, item) => sum + item.total, 0);
        document.getElementById('salesLog').innerHTML = `<h3>إجمالي اليوم: ${totalDay} ج.م</h3>` +
            log.map((s, index) => `
                <div class="log-item">
                    <span>فاتورة ${s.date} - ${s.total} ج.م</span>
                    <button class="btn" style="width:auto; margin:0;" onclick="viewReceipt(${index})">عرض</button>
                </div>`).join('');
    }

    function viewReceipt(index) {
        let log = JSON.parse(localStorage.getItem('sales') || '[]');
        printReceipt(log[index]);
    }

    function resetDay() {
        if(confirm("مسح كل شيء؟")) {
            localStorage.removeItem('sales');
            renderSales();
        }
    }

    window.onload = renderSales;
</script>
</body>
</html>
